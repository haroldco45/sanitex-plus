<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANITEX PLUS - Tarjeta Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1a3a82;
            --secondary-green: #76bc21;
            --white: #ffffff;
            --dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor Principal */
        .card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Encabezado con Logo */
        .header {
            background: linear-gradient(135deg, var(--primary-blue), #0d1f4a);
            padding: 40px 20px;
            color: var(--white);
        }

        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--secondary-green);
            overflow: hidden;
        }

        .logo-container img {
            width: 80%;
            object-fit: contain;
        }

        .company-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .company-name span {
            color: var(--secondary-green);
        }

        .slogan {
            font-size: 14px;
            font-weight: 300;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* Cuerpo de la Tarjeta */
        .content {
            padding: 30px 20px;
        }

        .location {
            color: var(--dark);
            font-size: 14px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        /* Botones de Acción */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: var(--primary-blue); }
        .btn-email { background-color: #db4437; }
        .btn-facebook { background-color: #4267B2; }

        /* Footer */
        .footer {
            background: #f9f9f9;
            padding: 20px;
            font-size: 11px;
            color: #888;
            border-top: 1px solid #eee;
        }

        .dev-tag {
            color: #555;
            text-decoration: none;
            font-weight: bold;
        }

        /* Control de Suscripción Invisible */
        #status-check {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="logo-container">
                <svg viewBox="0 0 100 100" width="80" height="80">
                    <path d="M10 20 L50 10 L90 20 L90 60 C90 80 50 95 50 95 C50 95 10 80 10 60 Z" fill="#1a3a82"/>
                    <path d="M50 10 L90 20 L90 60 C90 70 75 82 50 90 L50 10" fill="#76bc21"/>
                    <circle cx="45" cy="45" r="15" fill="#333"/>
                    <rect x="42" y="35" width="6" height="20" rx="2" fill="#555"/>
                    <path d="M35 55 Q 30 65 25 75" stroke="white" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <h1 class="company-name">SANITEX <span>PLUS</span></h1>
            <p class="slogan">Expertos en el control de plagas</p>
        </div>

        <div class="content">
            <div class="location">
                <i class="fas fa-map-marker-alt" style="color: var(--secondary-green);"></i>
                Caucasia, Antioquia
            </div>

            <div class="action-buttons">
                <a href="https://wa.me/573022290392" class="btn btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>

                <a href="tel:+573022290392" class="btn btn-call">
                    <i class="fas fa-phone-alt"></i> Llamar Directo
                </a>

                <a href="mailto:sanitexplus@gmail.com" class="btn btn-email">
                    <i class="fas fa-envelope"></i> Enviar Correo
                </a>

                <a href="https://facebook.com/sanitexplus" target="_blank" class="btn btn-facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Fecha de consulta: <span id="current-date"></span></p>
            <p>Hora local (Colombia): <span id="current-time"></span></p>
            <br>
            <p>App desarrollada por <strong>Vibras Positivas</strong></p>
            <p>(3117700431) - Derechos de Autor © 2026</p>
        </div>
    </div>

    <script>
        // Actualización de Fecha y Hora Colombia
        function updateDateTime() {
            const now = new Date();
            const optionsDate = { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'America/Bogota' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true, timeZone: 'America/Bogota' };
            
            document.getElementById('current-date').innerText = now.toLocaleDateString('es-CO', optionsDate);
            document.getElementById('current-time').innerText = now.toLocaleTimeString('es-CO', optionsTime);
        }

        // Control de Suscripción (Vencimiento)
        function checkSubscription() {
            const expirationDate = new Date('2027-04-06'); // Ejemplo: 1 año de vigencia
            const today = new Date();
            
            if (today > expirationDate) {
                document.body.innerHTML = "<div style='text-align:center; padding:50px; font-family:sans-serif;'><h2>Servicio Suspendido</h2><p>Por favor contacte al desarrollador para renovar su tarjeta digital.</p></div>";
            }
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
        checkSubscription();
    </script>
</body>
</html>
